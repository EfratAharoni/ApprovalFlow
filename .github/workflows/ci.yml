name: CI

# Test strategy (N6):
#   quality-gates job — unit tests only (offline, no containers needed)
#   verify job        — integration + e2e tests run here after docker compose up
#                       (pytest tests/integration and tests/e2e require running containers)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies — all services
        run: |
          for service in submission-service ai-agent-service \
            approval-service payment-service audit-service; do
            pip install -r services/$service/requirements.txt \
              --quiet
          done
          pip install ruff mypy pytest pytest-asyncio --quiet

      - name: Lint — ruff
        run: ruff check services/

      - name: Type check — mypy
        run: |
          for service in submission-service ai-agent-service \
            approval-service payment-service audit-service; do
            (cd services/$service && mypy app --ignore-missing-imports)
          done

      - name: Unit tests — all services
        env:
          LLM_MOCK: "true"
          PAYMENT_FAILURE_INJECT: ""
        run: |
          for service in submission-service ai-agent-service \
            approval-service payment-service audit-service; do
            (cd services/$service && pytest tests -v --tb=short)
          done

      - name: Build Docker images
        run: docker compose build

  verify:
    runs-on: ubuntu-latest
    needs: quality-gates

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install verify dependencies
        run: pip install httpx --quiet

      - name: Start system
        run: |
          docker compose up -d --wait
          sleep 15

      - name: Run verification script
        env:
          PAYMENT_FAILURE_INJECT: "inv-1012"
        run: python scripts/verify.py

      - name: Install integration + e2e test dependencies
        run: pip install httpx pytest --quiet

      - name: Integration tests (containers already up)
        run: pytest tests/integration -v -m integration --tb=short

      - name: E2E tests (containers already up)
        env:
          PAYMENT_FAILURE_INJECT: ""
        run: pytest tests/e2e -v -m e2e --tb=short

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --tail=50

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ── N2: CD — publish images to GHCR on green main ─────────────────────────
  publish:
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push all service images
        run: |
          REPO="ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/approvalflow"
          SHA="${{ github.sha }}"

          services=(
            "submission-service"
            "ai-agent-service"
            "approval-service"
            "payment-service"
            "audit-service"
          )

          for svc in "${services[@]}"; do
            docker build \
              -t "$REPO/$svc:$SHA" \
              -t "$REPO/$svc:latest" \
              services/$svc/
            docker push "$REPO/$svc:$SHA"
            docker push "$REPO/$svc:latest"
          done
