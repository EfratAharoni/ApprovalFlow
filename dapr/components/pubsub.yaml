apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: pubsub
spec:
  type: pubsub.redis
  version: v1
  metadata:
    - name: redisHost
      value: redis:6379
    - name: redisPassword
      value: ""
    - name: enableTLS
      value: "false"
    - name: processingTimeout
      value: "60s"
    - name: redeliverInterval
      value: "5s"
    - name: maxLenApprox
      value: "10000"
