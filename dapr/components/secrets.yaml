apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: secrets
spec:
  type: secretstores.local.env
  version: v1
  metadata:
    - name: prefix
      value: "APPROVALFLOW_"
# Secrets are read from environment variables prefixed with APPROVALFLOW_
# e.g. APPROVALFLOW_LLM_API_KEY, APPROVALFLOW_POSTGRES_PASSWORD
# In production replace with secretstores.azure.keyvault or similar
