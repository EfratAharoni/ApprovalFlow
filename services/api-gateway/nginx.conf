worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone: 10 r/s per IP, burst 20 nodelay
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"correlation_id":"$http_x_correlation_id"'
        '}';

    access_log /dev/stdout json_combined;
    error_log  /dev/stderr warn;

    # Propagate or generate a correlation ID for every request
    map $http_x_correlation_id $correlation_id {
        default $http_x_correlation_id;
        ""      $request_id;
    }

    upstream submission_service {
        server submission-service:8001;
    }

    upstream approval_service {
        server approval-service:8003;
    }

    upstream audit_service {
        server audit-service:8005;
    }

    upstream auth_service {
        server auth-service:8006;
    }

    server {
        listen 80;

        # Common proxy headers
        proxy_set_header X-Correlation-ID  $correlation_id;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Request-Time    $time_iso8601;
        proxy_set_header Host              $host;

        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # CORS — UI (localhost:3000) calls this gateway (localhost:8000) cross-origin
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Correlation-ID" always;

        # ── Internal auth subrequest (not reachable externally) ─────────────────
        # Called by auth_request directive; passes the original Authorization header.
        location = /_auth_verify {
            internal;
            proxy_pass http://auth_service/auth/verify?required_role=approver;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
            proxy_set_header X-Original-URI $request_uri;
        }

        # ── Auth service (public — token issuing) ───────────────────────────────
        location /auth/ {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service;
        }

        # ── Protected: only approvers/admins may call /decide ───────────────────
        location ~ ^/approvals/[^/]+/decide$ {
            if ($request_method = OPTIONS) { return 204; }
            auth_request /_auth_verify;
            auth_request_set $auth_role $upstream_http_x_role;
            error_page 401 = @unauthorized;
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://approval_service;
        }

        # ── Submission service ──────────────────────────────────────────────────
        location /submissions {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://submission_service;
        }

        # ── Approval service (queue + other non-decide endpoints) ───────────────
        location /approvals {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://approval_service;
        }

        # ── Audit service ───────────────────────────────────────────────────────
        location /audit {
            if ($request_method = OPTIONS) { return 204; }
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://audit_service;
        }

        # ── Health ──────────────────────────────────────────────────────────────
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── Unauthorized handler ────────────────────────────────────────────────
        location @unauthorized {
            add_header Content-Type application/json always;
            return 401 '{"error":"Unauthorized"}';
        }

        # Drop everything else
        location / {
            return 404 '{"detail":"Not found"}';
            add_header Content-Type application/json;
        }
    }
}
